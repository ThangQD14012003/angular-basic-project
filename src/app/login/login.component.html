<div class="wrap-login">
  <div class="card-form">
    <h2>ĐĂNG NHẬP</h2>

    <div *ngIf="errorMessage" class="alert-error">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" class="form" (ngSubmit)="handleLogin()">
      
      <div class="form-control">
        <label>Vai trò truy cập</label>
        <select formControlName="role" class="select-input">
          <option value="User">Khách hàng</option>
          <option value="Admin">Quản trị viên (Admin)</option>
        </select>
      </div>

      <div class="form-control">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Nhập email của bạn" />
        <div *ngIf="email?.touched && email?.invalid">
          <small class="error" *ngIf="email?.hasError('required')">Email là bắt buộc</small>
          <small class="error" *ngIf="email?.hasError('email')">Email không đúng định dạng</small>
        </div>
      </div>

      <div class="form-control">
        <label>Mật khẩu</label>
        <input type="password" formControlName="password" placeholder="Nhập mật khẩu" />
        <div *ngIf="password?.touched && password?.invalid">
          <small class="error" *ngIf="password?.hasError('required')">Mật khẩu là bắt buộc</small>
        </div>
      </div>

      <!-- BUTTON -->
      <div class="form-control">
        <button type="submit" class="btn">Đăng nhập</button>
      </div>

      <div class="form-footer">
        Chưa có tài khoản? <a routerLink="/register">Đăng ký ngay</a>
      </div>

    </form>
  </div>
</div>
